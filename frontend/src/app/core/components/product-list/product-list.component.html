<section class="container-fluid px-3 px-md-4 my-5">
  @if(products?.length === 0) {
  <div class="alert alert-warning text-center" role="alert">
    No products found.
  </div>
  } @else {
  <div class="row g-4">
    @for(product of products; track product?.sku) {
    <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xxl-2">
      <div class="card h-100 shadow-sm border-0">
        <a routerLink="/products/{{product.id}}">
          <img [src]="getProductImage(product.imageData)" [alt]="product.name" class="card-img-top product-img"></a>
        <div class="card-body d-flex flex-column">
          <a routerLink="/products/{{product.id}}">
            <h5 class="card-title fw-semibold">{{ product.name }}</h5>
          </a>
          <p class="card-text text-secondary mb-2">{{ product.description }}</p>
          <div class="d-flex justify-content-between align-items-center mt-auto">
            <span class="fw-bold text-primary">{{ product.unitPrice | currency:'USD' }}</span>
            <span class="badge" [ngClass]="{
                'bg-success': product.unitsInStock > 0,
                'bg-danger': product.unitsInStock === 0
              }">
              {{ product.unitsInStock > 0 ? 'In Stock' : 'Out of Stock' }}
            </span>
          </div>
          <button class="btn btn-primary w-100 mt-3" [disabled]="product.unitsInStock === 0" (click)="addToCart(product)">
            Add to Cart
          </button>
        </div>
      </div>
    </div>
    }
  </div>

  <div class="d-flex justify-content-center align-items-start gap-3 mt-4">

    <ngb-pagination [(page)]="pageNumber" [pageSize]="pageSize" [collectionSize]="totalElements" [maxSize]="5"
      (pageChange)="listProducts()" />

    <div ngbDropdown>
      <button type="button" class="btn btn-outline-primary" id="dropdownBasic1" ngbDropdownToggle>
        Page Size: {{ pageSize }}
      </button>
      <div ngbDropdownMenu aria-labelledby="dropdownBasic1">
        <button ngbDropdownItem (click)="updatePageSize(2)">2</button>
        <button ngbDropdownItem (click)="updatePageSize(5)">5</button>
        <button ngbDropdownItem (click)="updatePageSize(10)">10</button>
        <button ngbDropdownItem (click)="updatePageSize(15)">15</button>
      </div>
    </div>

  </div>

  }
</section>
