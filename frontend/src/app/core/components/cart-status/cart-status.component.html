<div class="d-flex align-items-center">
    <a class="btn btn-outline-primary position-relative me-2 d-flex align-items-center gap-2"
        routerLink="/cart-details">
        <i class="bi bi-cart-fill fs-5"></i>

        <!-- Cart count badge -->
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            {{ cartService.totalQuantity() }}
            <span class="visually-hidden">items in cart</span>
        </span>

        <!-- Total -->
        <span class="fw-semibold">₱{{ cartService.totalPrice() | number:'1.2-2' }}</span>
    </a>

    <a routerLink="/login" class="btn btn-outline-secondary rounded-circle">
        <i class="bi bi-person"></i>
    </a>
</div>
